# Bundled Controller Profile: KORG nanoKONTROL2.
#
# Mirrors dragonmidi/mapping.py's NANOKONTROL2_CONTROLS exactly - the migration
# invariant (docs/specs/static-mapping.md § MAP-CONFIG-003) requires this file to
# synthesize the same opinionated map as that Python constant.
#
# CC numbers are the commonly-documented factory-default CC-mode assignments,
# confirmed working against real nanoKONTROL2 hardware (2026-07-21) - see
# docs/high-level-design.md § Key Design Decisions.

name: "nanoKONTROL2"
match_substring: "nanokontrol2"
has_native_mode: false
default_channel: 1 # 1-based; MIDI channel 1 (0-based 0), the factory CC-mode default
has_jog_wheel: false
has_scene_button: false
setup_hint: "Hold SET MARKER + CYCLE while powering on for CC mode"

controls:
  faders: [0, 1, 2, 3, 4, 5, 6, 7]
  knobs: [16, 17, 18, 19, 20, 21, 22, 23]
  mutes: [48, 49, 50, 51, 52, 53, 54, 55]
  solos: [32, 33, 34, 35, 36, 37, 38, 39]
  transport:
    record: 45
    play: 41
    stop: 42
    rewind: 43
    fast_forward: 44
    cycle: 46
    previous_marker: 61
    next_marker: 62
    previous_track: 58
    next_track: 59
