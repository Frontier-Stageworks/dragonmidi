name: Build macOS Executable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Build with PyInstaller
        run: pyinstaller packaging/DragonMIDI-mac.spec --clean --noconfirm

      - name: Package .app as zip
        run: |
          cd dist
          zip -r DragonMIDI-mac.zip DragonMIDI.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DragonMIDI-mac-${{ github.sha }}
          path: dist/DragonMIDI-mac.zip
          retention-days: 7

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DragonMIDI-mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
