name: Build macOS Executable

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -e .

      - name: Generate .icns from PNG
        run: |
          mkdir -p dragonmidi.iconset
          sips -z 16   16   assets/dragonmidi.png --out dragonmidi.iconset/icon_16x16.png
          sips -z 32   32   assets/dragonmidi.png --out dragonmidi.iconset/icon_16x16@2x.png
          sips -z 32   32   assets/dragonmidi.png --out dragonmidi.iconset/icon_32x32.png
          sips -z 64   64   assets/dragonmidi.png --out dragonmidi.iconset/icon_32x32@2x.png
          sips -z 128  128  assets/dragonmidi.png --out dragonmidi.iconset/icon_128x128.png
          sips -z 256  256  assets/dragonmidi.png --out dragonmidi.iconset/icon_128x128@2x.png
          sips -z 256  256  assets/dragonmidi.png --out dragonmidi.iconset/icon_256x256.png
          sips -z 512  512  assets/dragonmidi.png --out dragonmidi.iconset/icon_256x256@2x.png
          sips -z 512  512  assets/dragonmidi.png --out dragonmidi.iconset/icon_512x512.png
          sips -z 1024 1024 assets/dragonmidi.png --out dragonmidi.iconset/icon_512x512@2x.png
          iconutil -c icns dragonmidi.iconset -o assets/dragonmidi.icns

      - name: Build with PyInstaller
        run: pyinstaller packaging/DragonMIDI-mac.spec --clean --noconfirm

      - name: Package .app as zip
        run: |
          cd dist
          zip -r DragonMIDI-mac.zip DragonMIDI.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DragonMIDI-mac-${{ github.sha }}
          path: dist/DragonMIDI-mac.zip
          retention-days: 7

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DragonMIDI-mac.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
